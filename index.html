    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }

        /* Notion-style Custom Classes */
        .notion-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            transition: all 0.2s ease;
        }
        
        /* Стили для выбранных карточек в мастере (черная обводка и жесткая тень) */
        .checkbox-card:checked + label {
            border-color: #000000;
            box-shadow: 4px 4px 0px 0px #000000;
            background-color: #fafafa;
        }

        .checkbox-card:disabled:not(:checked) + label {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sticky Table Logic */
        .table-container { 
            max-height: 75vh; 
            overflow: auto; 
            border: 2px solid #000; 
            border-radius: 16px;
            box-shadow: 6px 6px 0px 0px #000000;
            background: white;
            position: relative;
        }
        
        table { 
            border-collapse: separate; 
            border-spacing: 0; 
            min-width: 1400px; 
            width: 100%;
        }
        
        thead th { 
            position: sticky; 
            top: 0; 
            background-color: #ffffff; 
            color: #000; 
            z-index: 20; 
            padding: 16px;
            border-bottom: 2px solid #000;
            font-weight: 700;
        }
        
        tbody td:first-child, thead th:first-child { 
            position: sticky; 
            left: 0; 
            background-color: #f9fafb; 
            z-index: 10; 
            border-right: 2px solid #000; 
            font-weight: 600;
        }
        
        thead th:first-child { 
            z-index: 30; 
            background-color: #ffffff;
        }

        tbody td {
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 16px;
        }

        .category-row td {
            background-color: #111827;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
            position: sticky;
            left: 0;
            z-index: 5;
        }

        /* Wizard Logic */
        .wizard-step { display: none; }
        .wizard-step.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar for table */
        .table-container::-webkit-scrollbar { width: 10px; height: 10px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

</head>

        function renderTable() {
            const head = document.getElementById('table-head');
            let headHtml = '<tr><th class="w-64 text-left border-r-2 border-black">Сервисы</th>';
            tools.forEach(t => {
                headHtml += `<th class="w-40 text-center">${t.name}</th>`;
            });
            headHtml += '</tr>';
            head.innerHTML = headHtml;

            const body = document.getElementById('table-body');
            let bodyHtml = '';

            tableData.forEach(group => {
                // Заголовок группы
                bodyHtml += `<tr class="category-row"><td colspan="${tools.length + 1}" class="border-b border-gray-300">${group.category}</td></tr>`;
                
                // Строки группы
                group.rows.forEach(row => {
                    bodyHtml += `<tr class="hover:bg-gray-50 transition-colors">
                        <td class="font-medium text-sm border-r-2 border-black bg-white">${row.label}</td>`;
                    
                    tools.forEach(t => {
                        let content = '';
                        if (row.type === 'bool') {
                            const val = row.data[t.id];
                            if (val === true) content = '<span class="text-black font-black text-lg">✓</span>';
                            else if (val === false) content = '<span class="text-gray-300 font-bold">−</span>';
                        } else {
                            content = `<span class="text-sm">${row.data[t.id] || ''}</span>`;
                        }
                        bodyHtml += `<td class="text-center bg-white border-b border-gray-100">${content}</td>`;
                    });
                    
                    bodyHtml += '</tr>';
                });
            });
            body.innerHTML = bodyHtml;
        }


        // Ограничение на 2 чекбокса
        document.querySelectorAll('.step-1-cb').forEach(cb => {
            cb.addEventListener('change', () => enforceLimit('step-1-cb', 2));
        });
        document.querySelectorAll('.step-2-cb').forEach(cb => {
            cb.addEventListener('change', () => enforceLimit('step-2-cb', 2));
        });

        function enforceLimit(className, max) {
            const checkboxes = document.querySelectorAll(`.${className}`);
            const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
            
            checkboxes.forEach(cb => {
                if (!cb.checked) {
                    cb.disabled = checkedCount >= max;
                }
            });
        }

        function toggleAllFocus(checkbox) {
            const others = document.querySelectorAll('.step-3-cb:not([value="all"])');
            others.forEach(cb => {
                cb.checked = false;
                cb.disabled = checkbox.checked;
            });
        }

        function nextStep(step, validationClass) {
            // Проверка, выбрано ли хоть что-то
            if (validationClass) {
                const checked = document.querySelectorAll(`.${validationClass}:checked`);
                if (checked.length === 0) {
                    alert("Пожалуйста, выберите хотя бы один вариант.");
                    return;
                }
            }
            
            document.querySelectorAll('.wizard-step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
        }

        function prevStep(step) {
            document.querySelectorAll('.wizard-step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${step}`).classList.add('active');
        }

        function resetWizard() {
            document.querySelectorAll('.checkbox-card').forEach(cb => {
                cb.checked = false;
                cb.disabled = false;
            });
            document.querySelectorAll('.wizard-step').forEach(el => el.classList.remove('active'));
            document.getElementById('step-1').classList.add('active');
        }

        function calculateResults() {
            // Собираем все теги пользователя
            let selectedTags = [];
            document.querySelectorAll('.checkbox-card:checked').forEach(cb => {
                if(cb.value !== 'all') {
                    selectedTags.push(cb.value);
                }
            });

            const isAllFocus = document.getElementById('f5').checked;
            if (isAllFocus) selectedTags.push('all');

            // Подсчет баллов для каждого инструмента
            let scoredTools = tools.map(tool => {
                let score = 0;
                let matches = [];
                
                selectedTags.forEach(tag => {
                    if (tool.tags.includes(tag)) {
                        score += 1;
                        matches.push(tag);
                    }
                });
                return { ...tool, score, matches };
            });

            // Сортировка по убыванию баллов
            scoredTools.sort((a, b) => b.score - a.score);

            // Берем только те, где есть хоть 1 совпадение (или топ-3)
            let recommended = scoredTools.filter(t => t.score > 0).slice(0, 3);
            
            // Если ничего не подошло (маловероятно, но вдруг)
            if (recommended.length === 0) {
                recommended = [tools[0], tools[1]]; // Даем дефолт
            }

            // Отрисовка результатов
            const container = document.getElementById('results-container');
            let resHtml = '';
            
            recommended.forEach(t => {
                resHtml += `
                    <div class="border-2 border-black rounded-xl p-5 bg-white shadow-[4px_4px_0_0_#000]">
                        <div class="font-black text-xl mb-1">${t.name}</div>
                        <div class="text-gray-700">${t.desc}</div>
                    </div>
                `;
            });
            
            container.innerHTML = resHtml;
            nextStep(4, 'step-3-cb');
        }

        // Запуск при загрузке
        window.onload = () => {
            renderTable();
        };
    </script>
