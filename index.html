<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM/PMM Interview Simulators Master Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .table-container { max-height: 700px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 1rem; }
        .sticky-header { position: sticky; top: 0; background-color: #0f172a; z-index: 30; }
        .sticky-corner { position: sticky; top: 0; left: 0; background-color: #0f172a; z-index: 40; }
        .sticky-col { position: sticky; left: 0; z-index: 20; background-color: white; border-right: 1px solid #e2e8f0; }
        .spinner { border: 3px solid rgba(79, 70, 229, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <main class="max-w-7xl mx-auto space-y-12">
        <header class="bg-slate-900 rounded-3xl p-8 md:p-12 text-white shadow-2xl">
            <h1 class="text-3xl md:text-5xl font-black tracking-tight mb-4">Справочник ИИ-Симуляторов</h1>
            <p class="text-slate-400 font-medium">Для подготовки к интервью продакт-менеджеров.</p>
        </header>

        <!-- Калькулятор -->
        <section id="wizard" class="bg-white p-8 rounded-3xl border shadow-sm">
            <h2 class="text-2xl font-black mb-6">Индивидуальный подбор тренажера</h2>
            <div id="step1" class="space-y-4">
                <p class="font-bold">1. Таргетная компания (не больше 2):</p>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="selectCompany('FAANG')" class="p-3 border rounded-xl hover:bg-indigo-50">FAANG/Big Tech</button>
                    <button onclick="selectCompany('Startups')" class="p-3 border rounded-xl hover:bg-indigo-50">Стартапы</button>
                    <button onclick="selectCompany('Russian')" class="p-3 border rounded-xl hover:bg-indigo-50">Российские BigTech</button>
                    <button onclick="selectCompany('Remote')" class="p-3 border rounded-xl hover:bg-indigo-50">Зарубеж удаленка</button>
                </div>
            </div>
            <div id="step2" class="hidden space-y-4 mt-6">
                <p class="font-bold">2. Уровень роли (не больше 2):</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selectRole('Junior')" class="p-3 border rounded-xl hover:bg-indigo-50">Junior / Intern</button>
                    <button onclick="selectRole('Middle')" class="p-3 border rounded-xl hover:bg-indigo-50">Middle</button>
                    <button onclick="selectRole('Senior')" class="p-3 border rounded-xl hover:bg-indigo-50">Senior / Lead</button>
                    <button onclick="selectRole('CPO')" class="p-3 border rounded-xl hover:bg-indigo-50">Executive / CPO</button>
                </div>
            </div>
            <div id="step3" class="hidden mt-8">
                <div id="results" class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100"></div>
                <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-slate-900 text-white rounded-xl">Сбросить</button>
            </div>
        </section>

        <!-- Таблица -->
        <section class="table-container">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-white">
                        <th class="px-6 py-4 sticky-corner">Сервисы</th>
                        <th class="px-6 py-4 text-center sticky-header">Fluxx.ru</th>
                        <th class="px-6 py-4 text-center sticky-header">Teal</th>
                        <th class="px-6 py-4 text-center sticky-header">Hello Interview</th>
                        <th class="px-6 py-4 text-center sticky-header">Revarta</th>
                        <th class="px-6 py-4 text-center sticky-header">PMExercises</th>
                        <th class="px-6 py-4 text-center sticky-header">Sandbox4PM</th>
                        <th class="px-6 py-4 text-center sticky-header">AceRound</th>
                        <th class="px-6 py-4 text-center sticky-header">NoBSResume</th>
                    </tr>
                </thead>
                <tbody id="matrix-body" class="bg-white"></tbody>
            </table>
        </section>

        <!-- Sandbox -->
        <section class="bg-white p-8 rounded-3xl border shadow-sm">
            <h2 class="text-xl font-black mb-4">ИИ-Тренажер [Beta]</h2>
            <textarea id="candidateAnswer" rows="6" class="w-full border rounded-xl p-4 mb-4" placeholder="Введите ваш ответ на кейс..."></textarea>
            <button onclick="analyzeAnswer()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold">Запустить ИИ-оценку</button>
            <div id="sandboxLoading" class="hidden text-center py-6"><div class="spinner mx-auto"></div></div>
            <div id="sandboxResults" class="hidden mt-6 p-6 border rounded-2xl bg-slate-50"></div>
        </section>
    </main>

    <script>
        const matrixData = [
            { cat: "Саммари", rows: [
                { name: "Описание", fluxx: "Идеален для РФ рынка.", teal: "Трекер поиска и CRM.", hello: "Лучший для системного дизайна.", revarta: "Мастер STAR и софтов.", pmex: "Огромная база вопросов.", sandbox: "Стресс-тестирование.", aceround: "Живой помощник.", nobs: "Быстрая правка резюме." }
            ]},
            { cat: "Роли", rows: [
                { name: "Product Manager (PM)", fluxx: true, teal: true, hello: true, revarta: true, pmex: true, sandbox: true, aceround: true, nobs: true },
                { name: "Product Marketing Manager (PMM)", fluxx: false, teal: true, hello: false, revarta: true, pmex: false, sandbox: false, aceround: false, nobs: true }
            ]},
            { cat: "Цены", rows: [
                { name: "1 Месяц", fluxx: "2 990 ₽", teal: "$36", hello: "$47", revarta: "$39", pmex: "$15", sandbox: "$29", aceround: "$30", nobs: "Бесплатно" },
                { name: "3 Месяца", fluxx: "8 970 ₽", teal: "$79", hello: "$120", revarta: "$99", pmex: "$45", sandbox: "$29", aceround: "$90", nobs: "Бесплатно" },
                { name: "6 Месяцев", fluxx: "15 900 ₽", teal: "$140", hello: "$210", revarta: "$180", pmex: "$80", sandbox: "$58", aceround: "$150", nobs: "Бесплатно" }
            ]},
            { cat: "Фичи", rows: [
                { name: "Голосовой ввод", fluxx: true, teal: true, hello: true, revarta: true, pmex: true, sandbox: true, aceround: true, nobs: false },
                { name: "Анализ темпа речи", fluxx: false, teal: true, hello: false, revarta: false, pmex: false, sandbox: false, aceround: false, nobs: false },
                { name: "Поиск логических дыр", fluxx: true, teal: false, hello: true, revarta: true, pmex: true, sandbox: true, aceround: false, nobs: true },
                { name: "Интерактивная доска", fluxx: false, teal: false, hello: true, revarta: false, pmex: false, sandbox: false, aceround: false, nobs: false },
                { name: "Режим стресс-теста", fluxx: false, teal: false, hello: false, revarta: false, pmex: false, sandbox: true, aceround: false, nobs: false },
                { name: "Канбан-трекер", fluxx: false, teal: true, hello: false, revarta: false, pmex: false, sandbox: false, aceround: false, nobs: false }
            ]},
            { cat: "Уровни подготовки", rows: [
                { name: "Junior / Intern", fluxx: true, teal: true, hello: false, revarta: false, pmex: true, sandbox: false, aceround: true, nobs: true },
                { name: "Middle PM", fluxx: true, teal: true, hello: true, revarta: true, pmex: true, sandbox: true, aceround: true, nobs: true },
                { name: "Senior / Executive", fluxx: true, teal: false, hello: true, revarta: true, pmex: true, sandbox: true, aceround: true, nobs: false }
            ]},
            { cat: "Секции", rows: [
                { name: "System Design", fluxx: false, teal: false, hello: true, revarta: false, pmex: false, sandbox: false, aceround: false, nobs: false },
                { name: "Behavioral (STAR)", fluxx: true, teal: true, hello: false, revarta: true, pmex: false, sandbox: false, aceround: true, nobs: true },
                { name: "Product Sense", fluxx: true, teal: false, hello: true, revarta: false, pmex: true, sandbox: false, aceround: false, nobs: false },
                { name: "Metrics", fluxx: true, teal: false, hello: true, revarta: false, pmex: true, sandbox: true, aceround: false, nobs: false },
                { name: "Go-To-Market (GTM)", fluxx: false, teal: false, hello: false, revarta: true, pmex: false, sandbox: false, aceround: false, nobs: false }
            ]},
            { cat: "Отзывы (Что бесит / Что хвалят)", rows: [
                { name: "Негатив #1", fluxx: "Мало звонков в PRO.", teal: "Поверхностный фидбек.", hello: "Очень дорого.", revarta: "Нет тех-фидбека.", pmex: "Интерфейс 2012 года.", sandbox: "Паника от таймера.", aceround: "Плохо с акцентом.", nobs: "Редкие обновления." },
                { name: "Позитив #1", fluxx: "Кейсы Яндекса супер.", teal: "Лучший трекер поиска.", hello: "Глубина System Design.", revarta: "STAR просто идеал.", pmex: "База вопросов огонь.", sandbox: "Реальный стресс.", aceround: "Спас при заминке.", nobs: "Очень быстро." }
            ]}
        ];

        function renderMatrix() {
            const body = document.getElementById('matrix-body');
            matrixData.forEach(g => {
                body.innerHTML += `<tr class="bg-indigo-50 font-bold text-sm"><td colspan="9" class="px-6 py-2">${g.cat}</td></tr>`;
                g.rows.forEach(r => {
                    body.innerHTML += `<tr><td class="sticky-col px-6 py-3 border-b text-sm font-semibold">${r.name}</td>` +
                        Object.keys(r).slice(1).map(k => {
                            let val = r[k];
                            if (typeof val === 'boolean') return `<td class="text-center border-b">${val ? '✅' : '❌'}</td>`;
                            return `<td class="text-center text-[11px] border-b">${val}</td>`;
                        }).join('') + '</tr>';
                });
            });
        }

        async function analyzeAnswer() {
            const answer = document.getElementById('candidateAnswer').value;
            const res = document.getElementById('sandboxResults');
            const load = document.getElementById('sandboxLoading');
            
            load.classList.remove('hidden');
            res.classList.add('hidden');

            setTimeout(() => {
                load.classList.add('hidden');
                res.classList.remove('hidden');
                if(answer.length < 150 || answer.includes("не знаю") || answer.includes("проверка")) {
                    res.innerHTML = `<p class="text-red-600 font-bold">Дружочек, пока ты играешься, дата-центры тратят киловатты энергии впустую! Серверы годами ждут подключения к электричеству, чтобы обрабатывать реальные данные, а ты гоняешь ИИ по пустякам. Пиши нормально или не мучай ресурсы!</p>`;
                } else {
                    res.innerHTML = `<p class="font-bold">Хорошая попытка, кандидат! Ответ принят в обработку.</p>`;
                }
            }, 1000);
        }

        let selectedCompanies = [];
        let selectedRoles = [];

        function selectCompany(c) {
            if(!selectedCompanies.includes(c)) selectedCompanies.push(c);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function selectRole(r) {
            if(!selectedRoles.includes(r)) selectedRoles.push(r);
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('results').innerHTML = `
                <p class="font-black text-lg mb-2">ВАМ ПОДОЙДУТ:</p>
                <ul class="list-disc ml-5 space-y-2">
                    <li><b>Fluxx.ru</b> — если ориентируетесь на рынок РФ и продуктовые кейсы.</li>
                    <li><b>Hello Interview</b> — для глубокой проработки System Design и технических навыков.</li>
                    <li><b>Revarta</b> — для оттачивания поведенческих интервью и STAR-историй.</li>
                </ul>
            `;
        }

        window.onload = renderMatrix;
    </script>
</body>
</html>
